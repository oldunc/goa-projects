<!-- 1) თქვენი დავალებაა internal css-ის მეშვეობით გასტილოთ ვებსაიტზე შემოტანილი სათაური და პარაგრაფი (h1 and p), გამოიყენეთ css-ში მთლიანად ნასწავლი მასალა. ასევე გიაითვალისწინეთ რომ ელემენტები უნდა განსხვავდებოდნენ სტილით ერთმანეთისგან.


2) internal css-ის გამოყენებით გასტილეთ ვებ-საიტზე თქვენს მიწერ წინასწარ შემოტანილი ღილაკები css-ში მთლიანად ნასწავლი მასალის გამოყენებით -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        button{
            color:beige;
            border: double;
            background-color: darkblue;
            text-align: center;
        }
     
    </style>
</head>
<body>
    <h1 style="color: aliceblue;background-color: aqua;text-align: center;border: dotted;font-size: xx-large;">just a heading</h1>
    <p  style="color: blue;background-color: wheat;text-align: right;border: dashed; font-size: xx-small;">just a paragraph</p>
    <button>click me</button>
    <button>click me 2</button>
    <button>click me 3</button>

</html>
