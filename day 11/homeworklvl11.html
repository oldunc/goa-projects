ol - ordered list - თეგი, რომლის დახმარებითაც შეგვიძლია შევქმნათ დალაგებული სია. (ყველაფერი დანომრილია)

ul - unordered list - თეგი, რომლის დახმარებითაც შეგვიძლია შევქმნათ დაულაგებელი სია. (ყველაფერი გამოსახულია round bullet-ბის მეშვეობით)

li - list item - თეგი, რომლის დახმარებითაც შეგვიძლია შევქმნათ სიებში ახალი მნიშვნელობები.
